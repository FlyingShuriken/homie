services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: homie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    ipc: host
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/homie
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - telegram_session:/app/telegram_session

  frontend:
    build:
      context: ./frontend
      args:
        # Baked at build time — must be reachable from the user's browser.
        # Override with: docker compose build --build-arg NEXT_PUBLIC_API_URL=https://api.example.com
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  telegram_session:
