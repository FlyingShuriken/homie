services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    ipc: host
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - telegram_session:/app/telegram_session

  frontend:
    build:
      context: ./frontend
      args:
        # Baked at build time — must be reachable from the user's browser.
        # Override with: docker compose build --build-arg NEXT_PUBLIC_API_URL=https://api.example.com
        NEXT_PUBLIC_API_URL: http://<your-ec2-public-ip>:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  telegram_session:
